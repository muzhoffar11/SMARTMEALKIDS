{{ define "main" }}

<section class="hero">
  <h1>SMARTMEALKIDS</h1>
  <p>Pilih kategori menu berdasarkan hashtag.</p>
</section>

<section>
  <h2 class="section-title">Kategori Menu</h2>

  <div class="cards">
    {{ range .Site.Taxonomies.tags }}
    <div class="card">
      <a href="{{ .Page.RelPermalink }}">
        <h3>#{{ .Page.Title }}</h3>
      </a>
    </div>
    {{ end }}
  </div>
</section>

{{ end }}
